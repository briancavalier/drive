name: Factory Stage Runner

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      issue_number:
        required: true
        type: number
      pr_number:
        required: false
        type: number
        default: 0
      branch:
        required: true
        type: string
      artifacts_path:
        required: true
        type: string
      model:
        required: false
        type: string
        default: ""
      max_repair_attempts:
        required: false
        type: number
        default: 3
      ci_run_id:
        required: false
        type: string
        default: ""
      review_id:
        required: false
        type: string
        default: ""
    outputs:
      review_methodology:
        description: Resolved review methodology used for the stage run.
        value: ${{ jobs.run.outputs.review_methodology }}
      review_methodology_fallback:
        description: Indicates whether the review methodology defaulted due to fallback.
        value: ${{ jobs.run.outputs.review_methodology_fallback }}
      review_methodology_requested:
        description: Requested review methodology before fallback resolution.
        value: ${{ jobs.run.outputs.review_methodology_requested }}
      failure_type:
        description: Classified stage failure type.
        value: ${{ jobs.run.outputs.failure_type }}
      failure_message:
        description: Human-readable failure message captured by the stage runner.
        value: ${{ jobs.run.outputs.failure_message }}
      transient_retry_attempts:
        description: Number of transient retries consumed during the stage run.
        value: ${{ jobs.run.outputs.transient_retry_attempts }}
      refreshed_head_sha:
        description: Branch head SHA after any automatic refresh from origin/main.
        value: ${{ jobs.run.outputs.refreshed_head_sha }}
      refreshed_from_main:
        description: Indicates whether the branch was refreshed from origin/main.
        value: ${{ jobs.run.outputs.refreshed_from_main }}
    secrets:
      OPENAI_API_KEY:
        required: true
      FACTORY_GITHUB_TOKEN:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      review_methodology: ${{ steps.build.outputs.review_methodology }}
      review_methodology_fallback: ${{ steps.build.outputs.review_methodology_fallback }}
      review_methodology_requested: ${{ steps.build.outputs.review_methodology_requested }}
      failure_type: ${{ steps.validate_context.outputs.failure_type || steps.model_preflight.outputs.failure_type || steps.refresh.outputs.failure_type || steps.codex_failure.outputs.failure_type || steps.prepare.outputs.failure_type || steps.push.outputs.failure_type }}
      failure_message: ${{ steps.validate_context.outputs.failure_message || steps.model_preflight.outputs.failure_message || steps.refresh.outputs.failure_message || steps.codex_failure.outputs.failure_message || steps.prepare.outputs.failure_message || steps.push.outputs.failure_message }}
      transient_retry_attempts: ${{ steps.model_preflight.outputs.transient_retry_attempts || steps.push.outputs.transient_retry_attempts || steps.prepare.outputs.transient_retry_attempts || '0' }}
      refreshed_head_sha: ${{ steps.refresh.outputs.refreshed_head_sha || steps.capture_head.outputs.refreshed_head_sha }}
      refreshed_from_main: ${{ steps.refresh.outputs.refreshed || 'false' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh branch from main before stage
        id: refresh
        if: inputs.mode == 'implement' || inputs.mode == 'repair'
        continue-on-error: true
        run: node scripts/refresh-stage-branch.mjs
        env:
          FACTORY_BRANCH: ${{ inputs.branch }}

      - name: Stop on branch refresh conflict
        if: steps.refresh.outcome == 'failure'
        run: exit 1

      - name: Capture current branch head
        id: capture_head
        run: |
          echo "refreshed_head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate factory context
        id: validate_context
        if: inputs.pr_number > 0
        continue-on-error: true
        run: node scripts/validate-factory-context.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}

      - name: Stop on factory context validation failure
        if: steps.validate_context.outcome == 'failure'
        run: exit 1

      - name: Build stage prompt
        id: build
        run: node scripts/build-stage-prompt.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_MAX_REPAIR_ATTEMPTS: ${{ inputs.max_repair_attempts }}
          FACTORY_CI_RUN_ID: ${{ inputs.ci_run_id }}
          FACTORY_REVIEW_ID: ${{ inputs.review_id }}
          FACTORY_PLAN_PROMPT_MAX_CHARS: ${{ vars.FACTORY_PLAN_PROMPT_MAX_CHARS || '' }}
          FACTORY_IMPLEMENT_PROMPT_MAX_CHARS: ${{ vars.FACTORY_IMPLEMENT_PROMPT_MAX_CHARS || '' }}
          FACTORY_REPAIR_PROMPT_MAX_CHARS: ${{ vars.FACTORY_REPAIR_PROMPT_MAX_CHARS || '' }}
          FACTORY_PROMPT_HARD_MAX_CHARS: ${{ vars.FACTORY_PROMPT_HARD_MAX_CHARS || '' }}
          FACTORY_REVIEW_PROMPT_MAX_CHARS: ${{ vars.FACTORY_REVIEW_PROMPT_MAX_CHARS || '' }}
          FACTORY_REVIEW_METHOD: ${{ vars.FACTORY_REVIEW_METHOD || '' }}

      - name: Ensure artifacts path exists
        run: mkdir -p "${{ inputs.artifacts_path }}"

      - name: Resolve stage model
        id: model
        run: node scripts/resolve-stage-model.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_STAGE_MODEL_OVERRIDE: ${{ inputs.model }}
          FACTORY_CODEX_MODEL: ${{ vars.FACTORY_CODEX_MODEL || '' }}
          FACTORY_PLAN_MODEL: ${{ vars.FACTORY_PLAN_MODEL || '' }}
          FACTORY_IMPLEMENT_MODEL: ${{ vars.FACTORY_IMPLEMENT_MODEL || '' }}
          FACTORY_REPAIR_MODEL: ${{ vars.FACTORY_REPAIR_MODEL || '' }}
          FACTORY_REVIEW_MODEL: ${{ vars.FACTORY_REVIEW_MODEL || '' }}

      - name: Validate stage model
        id: model_preflight
        continue-on-error: true
        run: node scripts/validate-stage-model.mjs
        env:
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
          FACTORY_STAGE_MODE: ${{ inputs.mode }}
          FACTORY_STAGE_MODEL_SOURCE: ${{ steps.model.outputs.model_source }}
          FACTORY_STAGE_MODEL_SOURCE_VARIABLE: ${{ steps.model.outputs.model_source_variable }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Stop on stage model validation failure
        if: steps.model_preflight.outcome == 'failure'
        run: exit 1

      - name: Estimate stage cost
        id: cost
        run: node scripts/estimate-stage-cost.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
          FACTORY_COST_WARN_USD: ${{ vars.FACTORY_COST_WARN_USD || '' }}
          FACTORY_COST_HIGH_USD: ${{ vars.FACTORY_COST_HIGH_USD || '' }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Run Codex
        id: codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .factory/tmp/prompt.md
          sandbox: workspace-write
          model: ${{ steps.model.outputs.model }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Stop on Codex failure
        id: codex_failure
        if: steps.codex.outcome == 'failure'
        run: |
          echo "failure_type=stage_setup" >> "$GITHUB_OUTPUT"
          echo "failure_message=Stage setup prerequisites failed: Codex stage execution failed before branch output could be prepared." >> "$GITHUB_OUTPUT"
          exit 1

      - name: Prepare stage output for push
        id: prepare
        continue-on-error: true
        run: node scripts/prepare-stage-push.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_COST_SUMMARY_PATH: ${{ steps.cost.outputs.cost_summary_path }}
          FACTORY_REVIEW_METHOD: ${{ steps.build.outputs.review_methodology_requested }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Stop on stage output preparation failure
        if: steps.prepare.outcome == 'failure'
        run: exit 1

      - name: Push stage output
        id: push
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Stop on push failure
        if: steps.push.outcome == 'failure'
        run: exit 1

      - name: Record cost estimate on pull request
        if: inputs.pr_number > 0 && steps.push.outcome == 'success'
        run: node scripts/apply-pr-state.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_COST_ESTIMATE_USD: ${{ steps.cost.outputs.cost_estimate_usd }}
          FACTORY_COST_ESTIMATE_BAND: ${{ steps.cost.outputs.cost_estimate_band }}
          FACTORY_COST_ESTIMATE_EMOJI: ${{ steps.cost.outputs.cost_estimate_emoji }}
          FACTORY_COST_WARN_USD: ${{ steps.cost.outputs.cost_warn_usd }}
          FACTORY_COST_HIGH_USD: ${{ steps.cost.outputs.cost_high_usd }}
          FACTORY_COST_PRICING_SOURCE: ${{ steps.cost.outputs.cost_pricing_source }}
          FACTORY_LAST_ESTIMATED_STAGE: ${{ steps.cost.outputs.last_estimated_stage }}
          FACTORY_LAST_ESTIMATED_MODEL: ${{ steps.cost.outputs.last_estimated_model }}
          FACTORY_LAST_STAGE_COST_ESTIMATE_USD: ${{ steps.cost.outputs.last_stage_cost_estimate_usd }}
          FACTORY_ADD_LABELS: ${{ steps.cost.outputs.cost_label_to_add }}
          FACTORY_REMOVE_LABELS: ${{ steps.cost.outputs.cost_labels_to_remove }}

      # Two-stage review guard: record the freshly pushed review commit so CI completion
      # from the same SHA does not trigger an immediate rerun. process-review clears it.
      - name: Record pending review commit
        if: inputs.mode == 'review' && inputs.pr_number > 0 && steps.push.outcome == 'success' && steps.prepare.outputs.prepared_head_sha != '' && steps.prepare.outputs.prepared_head_sha != steps.capture_head.outputs.refreshed_head_sha
        run: node scripts/apply-pr-state.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_PENDING_REVIEW_SHA: ${{ steps.prepare.outputs.prepared_head_sha }}
          FACTORY_CI_STATUS: pending

      - name: Log telemetry skip on failure
        if: ${{ always() && failure() && steps.cost.outcome == 'success' }}
        run: echo "Factory telemetry entry not recorded because the stage failed after estimation."
