name: Factory Stage Runner

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      issue_number:
        required: true
        type: number
      pr_number:
        required: false
        type: number
        default: 0
      branch:
        required: true
        type: string
      artifacts_path:
        required: true
        type: string
      model:
        required: false
        type: string
        default: ""
      max_repair_attempts:
        required: false
        type: number
        default: 3
      ci_run_id:
        required: false
        type: string
        default: ""
      review_id:
        required: false
        type: string
        default: ""
    outputs:
      review_methodology:
        description: Resolved review methodology used for the stage run.
        value: ${{ jobs.run.outputs.review_methodology }}
      review_methodology_fallback:
        description: Indicates whether the review methodology defaulted due to fallback.
        value: ${{ jobs.run.outputs.review_methodology_fallback }}
      review_methodology_requested:
        description: Requested review methodology before fallback resolution.
        value: ${{ jobs.run.outputs.review_methodology_requested }}
      failure_type:
        description: Classified stage failure type.
        value: ${{ jobs.run.outputs.failure_type }}
      failure_message:
        description: Human-readable failure message captured by the stage runner.
        value: ${{ jobs.run.outputs.failure_message }}
      transient_retry_attempts:
        description: Number of transient retries consumed during the stage run.
        value: ${{ jobs.run.outputs.transient_retry_attempts }}
      refreshed_head_sha:
        description: Branch head SHA after any automatic refresh from origin/main.
        value: ${{ jobs.run.outputs.refreshed_head_sha }}
      refreshed_from_main:
        description: Indicates whether the branch was refreshed from origin/main.
        value: ${{ jobs.run.outputs.refreshed_from_main }}
      stage_model:
        description: Resolved model used for the stage.
        value: ${{ jobs.run.outputs.stage_model }}
      prompt_chars:
        description: Estimated prompt size in characters for the stage invocation.
        value: ${{ jobs.run.outputs.prompt_chars }}
      estimated_input_tokens:
        description: Calibrated estimated input tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_input_tokens }}
      estimated_cached_input_tokens:
        description: Calibrated estimated cached input tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_cached_input_tokens }}
      estimated_output_tokens:
        description: Calibrated estimated output tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_output_tokens }}
      estimated_input_tokens_before_calibration:
        description: Uncalibrated estimated input tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_input_tokens_before_calibration }}
      estimated_cached_input_tokens_before_calibration:
        description: Uncalibrated estimated cached input tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_cached_input_tokens_before_calibration }}
      estimated_output_tokens_before_calibration:
        description: Uncalibrated estimated output tokens for the stage invocation.
        value: ${{ jobs.run.outputs.estimated_output_tokens_before_calibration }}
      stage_estimate_usd:
        description: Calibrated estimated USD cost for the stage invocation.
        value: ${{ jobs.run.outputs.stage_estimate_usd }}
      stage_estimate_usd_before_calibration:
        description: Uncalibrated estimated USD cost for the stage invocation.
        value: ${{ jobs.run.outputs.stage_estimate_usd_before_calibration }}
      usage_provider:
        description: Provider for the stage invocation.
        value: ${{ jobs.run.outputs.usage_provider }}
      usage_api_surface:
        description: API surface for the stage invocation.
        value: ${{ jobs.run.outputs.usage_api_surface }}
      usage_pricing_version:
        description: Pricing version used for derived cost.
        value: ${{ jobs.run.outputs.usage_pricing_version }}
      usage_calibration_key:
        description: Calibration bucket applied to the stage invocation.
        value: ${{ jobs.run.outputs.usage_calibration_key }}
      usage_calibration_source:
        description: Calibration source applied to the stage invocation.
        value: ${{ jobs.run.outputs.usage_calibration_source }}
      usage_calibration_sample_size:
        description: Calibration sample size applied to the stage invocation.
        value: ${{ jobs.run.outputs.usage_calibration_sample_size }}
      usage_calibration_input_multiplier:
        description: Calibration multiplier for estimated input tokens.
        value: ${{ jobs.run.outputs.usage_calibration_input_multiplier }}
      usage_calibration_cached_input_multiplier:
        description: Calibration multiplier for estimated cached input tokens.
        value: ${{ jobs.run.outputs.usage_calibration_cached_input_multiplier }}
      usage_calibration_output_multiplier:
        description: Calibration multiplier for estimated output tokens.
        value: ${{ jobs.run.outputs.usage_calibration_output_multiplier }}
      usage_calibration_generated_at:
        description: Calibration generation timestamp.
        value: ${{ jobs.run.outputs.usage_calibration_generated_at }}
      intervention_requested:
        description: Indicates whether the stage requested a human intervention instead of producing output.
        value: ${{ jobs.run.outputs.intervention_requested }}
      intervention_payload:
        description: Validated stage-authored intervention payload.
        value: ${{ jobs.run.outputs.intervention_payload }}
    secrets:
      OPENAI_API_KEY:
        required: true
      FACTORY_GITHUB_TOKEN:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      review_methodology: ${{ steps.build.outputs.review_methodology }}
      review_methodology_fallback: ${{ steps.build.outputs.review_methodology_fallback }}
      review_methodology_requested: ${{ steps.build.outputs.review_methodology_requested }}
      failure_type: ${{ steps.validate_context.outputs.failure_type || steps.model_preflight.outputs.failure_type || steps.refresh.outputs.failure_type || steps.budget_preflight.outputs.failure_type || steps.codex_bootstrap_failure.outputs.failure_type || steps.codex_failure.outputs.failure_type || steps.detect_intervention.outputs.failure_type || steps.prepare.outputs.failure_type || steps.push.outputs.failure_type }}
      failure_message: ${{ steps.validate_context.outputs.failure_message || steps.model_preflight.outputs.failure_message || steps.refresh.outputs.failure_message || steps.budget_preflight.outputs.failure_message || steps.codex_bootstrap_failure.outputs.failure_message || steps.codex_failure.outputs.failure_message || steps.detect_intervention.outputs.failure_message || steps.prepare.outputs.failure_message || steps.push.outputs.failure_message }}
      transient_retry_attempts: ${{ steps.model_preflight.outputs.transient_retry_attempts || steps.push.outputs.transient_retry_attempts || steps.prepare.outputs.transient_retry_attempts || '0' }}
      refreshed_head_sha: ${{ steps.refresh.outputs.refreshed_head_sha || steps.capture_head.outputs.refreshed_head_sha }}
      refreshed_from_main: ${{ steps.refresh.outputs.refreshed || 'false' }}
      stage_model: ${{ steps.model.outputs.model }}
      prompt_chars: ${{ steps.cost.outputs.prompt_chars }}
      estimated_input_tokens: ${{ steps.cost.outputs.estimated_input_tokens }}
      estimated_cached_input_tokens: ${{ steps.cost.outputs.estimated_cached_input_tokens }}
      estimated_output_tokens: ${{ steps.cost.outputs.estimated_output_tokens }}
      estimated_input_tokens_before_calibration: ${{ steps.cost.outputs.estimated_input_tokens_before_calibration }}
      estimated_cached_input_tokens_before_calibration: ${{ steps.cost.outputs.estimated_cached_input_tokens_before_calibration }}
      estimated_output_tokens_before_calibration: ${{ steps.cost.outputs.estimated_output_tokens_before_calibration }}
      stage_estimate_usd: ${{ steps.cost.outputs.last_stage_cost_estimate_usd }}
      stage_estimate_usd_before_calibration: ${{ steps.cost.outputs.stage_estimate_usd_before_calibration }}
      usage_provider: ${{ steps.cost.outputs.usage_provider }}
      usage_api_surface: ${{ steps.cost.outputs.usage_api_surface }}
      usage_pricing_version: ${{ steps.cost.outputs.usage_pricing_version }}
      usage_calibration_key: ${{ steps.cost.outputs.cost_calibration_key }}
      usage_calibration_source: ${{ steps.cost.outputs.cost_calibration_source }}
      usage_calibration_sample_size: ${{ steps.cost.outputs.cost_calibration_sample_size }}
      usage_calibration_input_multiplier: ${{ steps.cost.outputs.usage_calibration_input_multiplier }}
      usage_calibration_cached_input_multiplier: ${{ steps.cost.outputs.usage_calibration_cached_input_multiplier }}
      usage_calibration_output_multiplier: ${{ steps.cost.outputs.usage_calibration_output_multiplier }}
      usage_calibration_generated_at: ${{ steps.cost.outputs.usage_calibration_generated_at }}
      intervention_requested: ${{ steps.detect_intervention.outputs.intervention_requested || 'false' }}
      intervention_payload: ${{ steps.detect_intervention.outputs.intervention_payload }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh branch from main before stage
        id: refresh
        if: inputs.mode == 'implement' || inputs.mode == 'repair'
        continue-on-error: true
        run: node scripts/refresh-stage-branch.mjs
        env:
          FACTORY_BRANCH: ${{ inputs.branch }}

      - name: Stop on branch refresh conflict
        if: steps.refresh.outcome == 'failure'
        run: exit 1

      - name: Capture current branch head
        id: capture_head
        run: |
          echo "refreshed_head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate factory context
        id: validate_context
        if: inputs.pr_number > 0
        continue-on-error: true
        run: node scripts/validate-factory-context.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}

      - name: Stop on factory context validation failure
        if: steps.validate_context.outcome == 'failure'
        run: exit 1

      - name: Build stage prompt
        id: build
        run: node scripts/build-stage-prompt.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_MAX_REPAIR_ATTEMPTS: ${{ inputs.max_repair_attempts }}
          FACTORY_CI_RUN_ID: ${{ inputs.ci_run_id }}
          FACTORY_REVIEW_ID: ${{ inputs.review_id }}
          FACTORY_PLAN_PROMPT_MAX_CHARS: ${{ vars.FACTORY_PLAN_PROMPT_MAX_CHARS || '' }}
          FACTORY_IMPLEMENT_PROMPT_MAX_CHARS: ${{ vars.FACTORY_IMPLEMENT_PROMPT_MAX_CHARS || '' }}
          FACTORY_REPAIR_PROMPT_MAX_CHARS: ${{ vars.FACTORY_REPAIR_PROMPT_MAX_CHARS || '' }}
          FACTORY_PROMPT_HARD_MAX_CHARS: ${{ vars.FACTORY_PROMPT_HARD_MAX_CHARS || '' }}
          FACTORY_REVIEW_PROMPT_MAX_CHARS: ${{ vars.FACTORY_REVIEW_PROMPT_MAX_CHARS || '' }}
          FACTORY_REVIEW_METHOD: ${{ vars.FACTORY_REVIEW_METHOD || '' }}

      - name: Ensure artifacts path exists
        run: mkdir -p "${{ inputs.artifacts_path }}"

      - name: Resolve stage model
        id: model
        run: node scripts/resolve-stage-model.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_STAGE_MODEL_OVERRIDE: ${{ inputs.model }}
          FACTORY_CODEX_MODEL: ${{ vars.FACTORY_CODEX_MODEL || '' }}
          FACTORY_PLAN_MODEL: ${{ vars.FACTORY_PLAN_MODEL || '' }}
          FACTORY_IMPLEMENT_MODEL: ${{ vars.FACTORY_IMPLEMENT_MODEL || '' }}
          FACTORY_REPAIR_MODEL: ${{ vars.FACTORY_REPAIR_MODEL || '' }}
          FACTORY_REVIEW_MODEL: ${{ vars.FACTORY_REVIEW_MODEL || '' }}

      - name: Validate stage model
        id: model_preflight
        continue-on-error: true
        run: node scripts/validate-stage-model.mjs
        env:
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
          FACTORY_STAGE_MODE: ${{ inputs.mode }}
          FACTORY_STAGE_MODEL_SOURCE: ${{ steps.model.outputs.model_source }}
          FACTORY_STAGE_MODEL_SOURCE_VARIABLE: ${{ steps.model.outputs.model_source_variable }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Stop on stage model validation failure
        if: steps.model_preflight.outcome == 'failure'
        run: exit 1

      - name: Estimate stage cost
        id: cost
        run: node scripts/estimate-stage-cost.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
          FACTORY_COST_WARN_USD: ${{ vars.FACTORY_COST_WARN_USD || '' }}
          FACTORY_COST_HIGH_USD: ${{ vars.FACTORY_COST_HIGH_USD || '' }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Budget preflight hook
        id: budget_preflight
        continue-on-error: true
        run: node scripts/enforce-stage-budget.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_COST_SUMMARY_PATH: ${{ steps.cost.outputs.cost_summary_path }}
          FACTORY_PROMPT_META_PATH: .factory/tmp/prompt-meta.json
          FACTORY_PLAN_PATH: ${{ inputs.artifacts_path }}/plan.md

      - name: Stop on budget preflight failure
        if: steps.budget_preflight.outcome == 'failure'
        run: exit 1

      - name: Bootstrap Codex CLI hybrid
        id: codex_bootstrap
        if: (inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true')
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          codex-version: 0.114.0

      - name: Verify Codex CLI hybrid bootstrap
        id: codex_verify
        if: ((inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true')) && steps.codex_bootstrap.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          which codex
          codex --version
          test -d "${CODEX_HOME:-$HOME/.codex}"

          telemetry_dir="${RUNNER_TEMP}/codex-cli-telemetry/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ inputs.mode }}"
          mkdir -p "$telemetry_dir"

          {
            echo "telemetry_dir=$telemetry_dir"
            echo "jsonl_path=$telemetry_dir/codex-events.jsonl"
            echo "final_message_path=$telemetry_dir/final-message.md"
            echo "actual_usage_path=$telemetry_dir/actual-usage.json"
            echo "log_path=$telemetry_dir/codex-cli.log"
          } >> "$GITHUB_OUTPUT"

      - name: Execute Codex CLI hybrid
        id: codex_cli
        if: ((inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true')) && steps.codex_verify.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          FACTORY_IMPLEMENT_TIMEOUT_MINUTES: ${{ vars.FACTORY_IMPLEMENT_TIMEOUT_MINUTES || '20' }}
        run: |
          set -euo pipefail
          codex_command=(
            codex exec
            --skip-git-repo-check
            --cd "$GITHUB_WORKSPACE"
            --output-last-message "${{ steps.codex_verify.outputs.final_message_path }}"
            --model "${{ steps.model.outputs.model }}"
            --full-auto
            --sandbox workspace-write
            --json
          )

          set +e
          if [ "${{ inputs.mode }}" = "implement" ]; then
            timeout --signal=TERM --kill-after=30s "${FACTORY_IMPLEMENT_TIMEOUT_MINUTES}m" \
              "${codex_command[@]}" \
              < .factory/tmp/prompt.md \
              > >(tee "${{ steps.codex_verify.outputs.jsonl_path }}") \
              2> >(tee "${{ steps.codex_verify.outputs.log_path }}" >&2)
            status=$?
          else
            "${codex_command[@]}" \
              < .factory/tmp/prompt.md \
              > >(tee "${{ steps.codex_verify.outputs.jsonl_path }}") \
              2> >(tee "${{ steps.codex_verify.outputs.log_path }}" >&2)
            status=$?
          fi
          set -e

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Parse Codex CLI hybrid telemetry
        id: codex_json_telemetry
        if: ((inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true')) && steps.codex_cli.outcome == 'success'
        continue-on-error: true
        run: node scripts/parse-codex-json-telemetry.mjs
        env:
          FACTORY_CODEX_JSONL_PATH: ${{ steps.codex_verify.outputs.jsonl_path }}
          FACTORY_CODEX_USAGE_OUTPUT_PATH: ${{ steps.codex_verify.outputs.actual_usage_path }}

      - name: Upload Codex CLI hybrid artifacts
        if: always() && ((inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true'))
        uses: actions/upload-artifact@v4
        with:
          name: codex-cli-telemetry-${{ github.run_id }}-${{ github.job }}-${{ inputs.mode }}
          if-no-files-found: ignore
          path: |
            .factory/tmp/prompt.md
            ${{ steps.codex_verify.outputs.jsonl_path }}
            ${{ steps.codex_verify.outputs.log_path }}
            ${{ steps.codex_verify.outputs.final_message_path }}
            ${{ steps.codex_json_telemetry.outputs.actual_usage_path || steps.codex_verify.outputs.actual_usage_path }}

      - name: Bootstrap standard Codex execution
        id: codex_bootstrap_standard
        if: (inputs.mode != 'plan' || vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY != 'true') && (inputs.mode != 'implement' || vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT != 'true')
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ steps.model.outputs.model }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Stop on standard Codex bootstrap failure
        id: codex_bootstrap_failure
        if: (inputs.mode != 'plan' || vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY != 'true') && (inputs.mode != 'implement' || vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT != 'true') && steps.codex_bootstrap_standard.outcome == 'failure'
        run: |
          echo "failure_type=stage_setup" >> "$GITHUB_OUTPUT"
          echo "failure_message=Stage setup prerequisites failed: Codex runtime bootstrap failed before execution could start." >> "$GITHUB_OUTPUT"
          exit 1

      - name: Run Codex
        id: codex
        if: (inputs.mode != 'plan' || vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY != 'true') && (inputs.mode != 'implement' || vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT != 'true') && steps.codex_bootstrap_standard.outcome == 'success' && !(inputs.mode == 'review' && steps.build.outputs.review_methodology == 'multi-review')
        continue-on-error: true
        shell: bash
        env:
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
        run: |
          set -o pipefail

          codex_log=".factory/tmp/codex-run.log"
          codex_output=".factory/tmp/codex-final-message.md"

          mkdir -p .factory/tmp

          codex exec \
            --skip-git-repo-check \
            --cd "$PWD" \
            --output-last-message "$codex_output" \
            --model "$FACTORY_STAGE_MODEL" \
            --full-auto \
            --sandbox workspace-write \
            < .factory/tmp/prompt.md \
            2>&1 | tee "$codex_log"

          status=${PIPESTATUS[0]}

          {
            echo "log_path=$codex_log"
            echo "output_file=$codex_output"
          } >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Run multi-review reviewers
        id: codex_multi_review
        if: (inputs.mode != 'plan' || vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY != 'true') && (inputs.mode != 'implement' || vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT != 'true') && steps.codex_bootstrap_standard.outcome == 'success' && inputs.mode == 'review' && steps.build.outputs.review_methodology == 'multi-review'
        continue-on-error: true
        shell: bash
        env:
          FACTORY_STAGE_MODEL: ${{ steps.model.outputs.model }}
        run: |
          set -euo pipefail

          selection_path="${{ inputs.artifacts_path }}/reviewers/selection.json"
          if [ ! -f "$selection_path" ]; then
            echo "Missing reviewer selection artifact at $selection_path" >&2
            exit 1
          fi

          mapfile -t reviewers < <(node --input-type=module -e 'import fs from "node:fs"; const selection = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); for (const reviewer of selection.selected_reviewers || []) console.log(reviewer.name);' "$selection_path")

          if [ "${#reviewers[@]}" -eq 0 ]; then
            echo "No selected reviewers found in $selection_path" >&2
            exit 1
          fi

          mkdir -p .factory/tmp
          combined_log=".factory/tmp/codex-run.log"
          : > "$combined_log"
          last_output=""

          for reviewer in "${reviewers[@]}"; do
            reviewer_safe="${reviewer//[^A-Za-z0-9_-]/-}"
            reviewer_prompt="$(FACTORY_REVIEWER_NAME="$reviewer" FACTORY_ARTIFACTS_PATH="${{ inputs.artifacts_path }}" node scripts/run-reviewer.mjs)"
            reviewer_output=".factory/tmp/reviewer-${reviewer_safe}-final-message.md"
            last_output="$reviewer_output"

            {
              echo "===== reviewer:${reviewer} ====="
              codex exec \
                --skip-git-repo-check \
                --cd "$PWD" \
                --output-last-message "$reviewer_output" \
                --model "$FACTORY_STAGE_MODEL" \
                --full-auto \
                --sandbox workspace-write \
                < "$reviewer_prompt"
            } 2>&1 | tee -a "$combined_log"
          done

          {
            echo "log_path=$combined_log"
            echo "output_file=$last_output"
          } >> "$GITHUB_OUTPUT"

      - name: Stop on Codex failure
        id: codex_failure
        if: steps.codex.outcome == 'failure' || steps.codex_multi_review.outcome == 'failure' || (((inputs.mode == 'plan' && vars.FACTORY_ENABLE_CODEX_HYBRID_CANARY == 'true') || (inputs.mode == 'implement' && vars.FACTORY_ENABLE_CODEX_HYBRID_IMPLEMENT == 'true')) && (steps.codex_bootstrap.outcome == 'failure' || steps.codex_verify.outcome == 'failure' || steps.codex_cli.outcome == 'failure' || steps.codex_json_telemetry.outcome == 'failure'))
        shell: bash
        env:
          FACTORY_IMPLEMENT_TIMEOUT_MINUTES: ${{ vars.FACTORY_IMPLEMENT_TIMEOUT_MINUTES || '20' }}
        run: |
          if [ "${{ steps.codex.outcome }}" = "failure" ]; then
            failure_message="$(node scripts/extract-codex-failure.mjs ".factory/tmp/codex-run.log")"
            failure_type="$(node --input-type=module -e 'import { classifyFailure } from "./scripts/lib/failure-classification.mjs"; process.stdout.write(classifyFailure(process.argv[1] || ""));' "$failure_message")"
          elif [ "${{ steps.codex_multi_review.outcome }}" = "failure" ]; then
            failure_message="$(node scripts/extract-codex-failure.mjs ".factory/tmp/codex-run.log")"
            failure_type="$(node --input-type=module -e 'import { classifyFailure } from "./scripts/lib/failure-classification.mjs"; process.stdout.write(classifyFailure(process.argv[1] || ""));' "$failure_message")"
          elif [ "${{ inputs.mode }}" = "implement" ] && { [ "${{ steps.codex_cli.outputs.exit_code }}" = "124" ] || [ "${{ steps.codex_cli.outputs.exit_code }}" = "137" ]; }; then
            failure_type="budget_guardrail"
            failure_message="Budget guardrail terminated the hybrid implement Codex session after ${FACTORY_IMPLEMENT_TIMEOUT_MINUTES} minute(s). The runtime guardrail timed out the session and may have force-killed it after the grace period. Reduce the planned change surface or split the work before retrying."
          else
            failure_type="stage_setup"
            failure_message="Stage setup prerequisites failed: Codex stage execution failed before branch output could be prepared."
          fi

          echo "failure_type=$failure_type" >> "$GITHUB_OUTPUT"
          {
            echo "failure_message<<EOF"
            echo "$failure_message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 1

      - name: Detect stage intervention request
        id: detect_intervention
        continue-on-error: true
        run: node scripts/detect-stage-intervention-request.mjs
        env:
          FACTORY_MODE: ${{ inputs.mode }}

      - name: Stop on stage intervention validation failure
        if: steps.detect_intervention.outcome == 'failure'
        run: exit 1

      - name: Synthesize multi-review artifacts
        if: inputs.mode == 'review' && steps.detect_intervention.outputs.intervention_requested != 'true' && steps.build.outputs.review_methodology == 'multi-review'
        run: node scripts/run-review-coordinator.mjs
        env:
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}

      - name: Prepare stage output for push
        id: prepare
        if: steps.detect_intervention.outputs.intervention_requested != 'true'
        continue-on-error: true
        run: node scripts/prepare-stage-push.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          FACTORY_ENABLE_SELF_MODIFY: ${{ vars.FACTORY_ENABLE_SELF_MODIFY || '' }}
          FACTORY_MODE: ${{ inputs.mode }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_COST_SUMMARY_PATH: ${{ steps.cost.outputs.cost_summary_path }}
          FACTORY_REVIEW_METHOD: ${{ steps.build.outputs.review_methodology_requested }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          FACTORY_STAGE_ACTUAL_USAGE_PATH: ${{ steps.codex_json_telemetry.outputs.actual_usage_path }}

      - name: Stop on stage output preparation failure
        if: steps.detect_intervention.outputs.intervention_requested != 'true' && steps.prepare.outcome == 'failure'
        run: exit 1

      - name: Push stage output
        id: push
        if: steps.detect_intervention.outputs.intervention_requested != 'true'
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Stop on push failure
        if: steps.detect_intervention.outputs.intervention_requested != 'true' && steps.push.outcome == 'failure'
        run: exit 1

      - name: Read actual stage telemetry for pull request
        id: actual_cost
        if: inputs.pr_number > 0 && steps.detect_intervention.outputs.intervention_requested != 'true' && steps.push.outcome == 'success'
        run: node scripts/read-cost-summary-actuals.mjs
        env:
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}

      - name: Record cost estimate on pull request
        if: inputs.pr_number > 0 && steps.detect_intervention.outputs.intervention_requested != 'true' && steps.push.outcome == 'success'
        run: node scripts/apply-pr-state.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_COST_ESTIMATE_USD: ${{ steps.cost.outputs.cost_estimate_usd }}
          FACTORY_COST_ESTIMATE_BAND: ${{ steps.cost.outputs.cost_estimate_band }}
          FACTORY_COST_ESTIMATE_EMOJI: ${{ steps.cost.outputs.cost_estimate_emoji }}
          FACTORY_COST_WARN_USD: ${{ steps.cost.outputs.cost_warn_usd }}
          FACTORY_COST_HIGH_USD: ${{ steps.cost.outputs.cost_high_usd }}
          FACTORY_COST_PRICING_SOURCE: ${{ steps.cost.outputs.cost_pricing_source }}
          FACTORY_LAST_ESTIMATED_STAGE: ${{ steps.cost.outputs.last_estimated_stage }}
          FACTORY_LAST_ESTIMATED_MODEL: ${{ steps.cost.outputs.last_estimated_model }}
          FACTORY_LAST_STAGE_COST_ESTIMATE_USD: ${{ steps.cost.outputs.last_stage_cost_estimate_usd }}
          FACTORY_ACTUAL_API_SURFACE: ${{ steps.actual_cost.outputs.actual_api_surface }}
          FACTORY_ACTUAL_STAGE_COST_USD: ${{ steps.actual_cost.outputs.actual_stage_cost_usd }}
          FACTORY_ACTUAL_INPUT_TOKENS: ${{ steps.actual_cost.outputs.actual_input_tokens }}
          FACTORY_ACTUAL_CACHED_INPUT_TOKENS: ${{ steps.actual_cost.outputs.actual_cached_input_tokens }}
          FACTORY_ACTUAL_OUTPUT_TOKENS: ${{ steps.actual_cost.outputs.actual_output_tokens }}
          FACTORY_ACTUAL_REASONING_TOKENS: ${{ steps.actual_cost.outputs.actual_reasoning_tokens }}
          FACTORY_ADD_LABELS: ${{ steps.cost.outputs.cost_label_to_add }}
          FACTORY_REMOVE_LABELS: ${{ steps.cost.outputs.cost_labels_to_remove }}

      # Two-stage review guard: record the freshly pushed review commit so CI completion
      # from the same SHA does not trigger an immediate rerun. process-review clears it.
      - name: Record pending review commit
        if: inputs.mode == 'review' && inputs.pr_number > 0 && steps.detect_intervention.outputs.intervention_requested != 'true' && steps.push.outcome == 'success' && steps.prepare.outputs.prepared_head_sha != '' && steps.prepare.outputs.prepared_head_sha != steps.capture_head.outputs.refreshed_head_sha
        run: node scripts/apply-pr-state.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN || github.token }}
          FACTORY_PR_NUMBER: ${{ inputs.pr_number }}
          FACTORY_PENDING_REVIEW_SHA: ${{ steps.prepare.outputs.prepared_head_sha }}
          FACTORY_CI_STATUS: pending

      - name: Log telemetry skip on failure
        if: ${{ always() && failure() && steps.cost.outcome == 'success' }}
        run: echo "Factory telemetry entry not recorded because the stage failed after estimation."
