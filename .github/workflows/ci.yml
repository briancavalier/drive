name: CI

on:
  push:
    branches:
      - main
      - factory/**
  pull_request:

permissions:
  contents: read

jobs:
  factory-artifact-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run factory artifact guard
        run: node scripts/check-factory-run-artifacts.mjs

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run tests
        run: npm test

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow files
        uses: raven-actions/actionlint@v2
