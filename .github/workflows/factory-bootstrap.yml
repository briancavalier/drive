name: Factory Bootstrap

on:
  workflow_dispatch:
    inputs:
      run_hybrid_canary:
        description: Run the plan-stage hybrid Codex canary instead of bootstrap-only setup.
        required: false
        default: false
        type: boolean
      issue_number:
        description: Issue number associated with the prepared factory branch.
        required: false
        default: 0
        type: number
      branch:
        description: Existing prepared factory branch to run the canary against.
        required: false
        default: ""
        type: string
      artifacts_path:
        description: Existing artifacts path for the issue, e.g. .factory/runs/123.
        required: false
        default: ""
        type: string
      max_repair_attempts:
        description: Max repair attempts metadata to pass through to the stage runner.
        required: false
        default: "3"
        type: string
      finalize_plan:
        description: Finalize planning state after a successful canary run.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ensure factory labels exist
        run: node scripts/ensure-labels.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summarize setup requirements
        run: |
          {
            echo "## Factory Bootstrap"
            echo ""
            echo "Factory labels, including the advisory cost-band labels, are now ensured for this repository."
            echo ""
            echo "Required repository setup:"
            echo "- Add the \`OPENAI_API_KEY\` repository secret."
            echo "- Set default Actions workflow permissions to Read repository contents and packages."
            echo "- Allow GitHub Actions to create pull requests."
            echo "- Keep the CI workflow named \`CI\`, or update the workflow_run trigger in \`factory-pr-loop.yml\`."
            echo "- Protect the default branch and require human review for merges."
            echo "- Optional: set \`FACTORY_COST_WARN_USD\` and \`FACTORY_COST_HIGH_USD\` to tune advisory cost bands."
          } >> "$GITHUB_STEP_SUMMARY"

  hybrid-canary:
    if: inputs.run_hybrid_canary
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: plan
      issue_number: ${{ inputs.issue_number }}
      pr_number: 0
      branch: ${{ inputs.branch }}
      artifacts_path: ${{ inputs.artifacts_path }}
      max_repair_attempts: ${{ fromJSON(inputs.max_repair_attempts) }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  finalize-canary:
    if: inputs.run_hybrid_canary && inputs.finalize_plan && needs.hybrid-canary.result == 'success'
    needs:
      - hybrid-canary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Finalize planning state
        run: node scripts/finalize-plan.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_PR_NUMBER: "0"
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_MAX_REPAIR_ATTEMPTS: ${{ inputs.max_repair_attempts }}
