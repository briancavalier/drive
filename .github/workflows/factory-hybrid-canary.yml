name: Factory Hybrid Canary
run-name: >-
  ${{
    format(
      'Factory hybrid canary: issue #{0} ({1})',
      inputs.issue_number,
      inputs.branch
    )
  }}

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number associated with the prepared factory branch.
        required: true
        type: number
      branch:
        description: Existing factory branch to run the plan-stage canary against.
        required: true
        type: string
      artifacts_path:
        description: Existing artifacts path for the issue, e.g. .factory/runs/123.
        required: true
        type: string
      max_repair_attempts:
        description: Max repair attempts metadata to pass through to the stage runner.
        required: false
        default: "3"
        type: string
      finalize_plan:
        description: Finalize planning state after a successful canary run.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  plan:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: plan
      issue_number: ${{ inputs.issue_number }}
      pr_number: 0
      branch: ${{ inputs.branch }}
      artifacts_path: ${{ inputs.artifacts_path }}
      max_repair_attempts: ${{ fromJSON(inputs.max_repair_attempts) }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  finalize:
    if: inputs.finalize_plan && needs.plan.result == 'success'
    needs:
      - plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Finalize planning state
        run: node scripts/finalize-plan.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_ISSUE_NUMBER: ${{ inputs.issue_number }}
          FACTORY_PR_NUMBER: "0"
          FACTORY_BRANCH: ${{ inputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ inputs.artifacts_path }}
          FACTORY_MAX_REPAIR_ATTEMPTS: ${{ inputs.max_repair_attempts }}
