name: Factory Intake
run-name: >-
  ${{ format('Factory: planning {0}', github.event.issue.title) }}

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  route:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      issue_number: ${{ steps.route.outputs.issue_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Route factory command
        id: route
        run: node scripts/route-pr-loop.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  prepare:
    if: needs.route.outputs.action == 'start'
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      issue_number: ${{ steps.prepare.outputs.issue_number }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      branch: ${{ steps.prepare.outputs.branch }}
      artifacts_path: ${{ steps.prepare.outputs.artifacts_path }}
      max_repair_attempts: ${{ steps.prepare.outputs.max_repair_attempts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ensure factory labels exist
        run: node scripts/ensure-labels.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Prepare branch for planning
        id: prepare
        run: node scripts/prepare-intake.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  plan:
    if: needs.route.outputs.action == 'start'
    needs: prepare
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: plan
      issue_number: ${{ fromJSON(needs.prepare.outputs.issue_number) }}
      pr_number: 0
      branch: ${{ needs.prepare.outputs.branch }}
      artifacts_path: ${{ needs.prepare.outputs.artifacts_path }}
      max_repair_attempts: ${{ fromJSON(needs.prepare.outputs.max_repair_attempts) }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  finalize:
    if: needs.route.outputs.action == 'start' && needs.plan.result == 'success'
    needs:
      - route
      - prepare
      - plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Finalize planning state
        run: node scripts/finalize-plan.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.prepare.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.prepare.outputs.artifacts_path }}
          FACTORY_MAX_REPAIR_ATTEMPTS: ${{ needs.prepare.outputs.max_repair_attempts }}
