name: Factory PR Loop
run-name: >-
  ${{
    github.event_name == 'issue_comment' &&
    github.event.issue.pull_request &&
    format('Factory command: {0}', github.event.comment.body) ||
    github.event_name == 'pull_request_review' &&
    format('Factory: repairing {0}', github.event.pull_request.title) ||
    github.event_name == 'workflow_run' &&
    github.event.workflow_run.event == 'pull_request' &&
    (
      github.event.workflow_run.conclusion == 'success' &&
      format(
        'Factory: reviewing {0}',
        github.event.workflow_run.display_title || github.event.workflow_run.head_branch
      ) ||
      contains(
        fromJSON('["failure","timed_out","action_required"]'),
        github.event.workflow_run.conclusion
      ) &&
      format(
        'Factory: repairing {0}',
        github.event.workflow_run.display_title || github.event.workflow_run.head_branch
      )
    ) ||
    'Factory PR Loop'
  }}

on:
  issue_comment:
    types:
      - created
  pull_request:
    types:
      - closed
  pull_request_review:
    types:
      - submitted
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  # Keep this startup guard limited to event-safe properties that are always present.
  # Per-PR serialization across mixed event types happens in job-level concurrency
  # using the routed concurrency key emitted by the route job.
  group: factory-pr-loop-${{ github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  route:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      concurrency_key: ${{ steps.route.outputs.concurrency_key }}
      pr_number: ${{ steps.route.outputs.pr_number }}
      issue_number: ${{ steps.route.outputs.issue_number }}
      branch: ${{ steps.route.outputs.branch }}
      base_branch: ${{ steps.route.outputs.base_branch }}
      final_artifact_ref: ${{ steps.route.outputs.final_artifact_ref }}
      artifacts_path: ${{ steps.route.outputs.artifacts_path }}
      ci_run_id: ${{ steps.route.outputs.ci_run_id }}
      review_id: ${{ steps.route.outputs.review_id }}
      failure_intervention: ${{ steps.route.outputs.failure_intervention }}
      intervention_id: ${{ steps.route.outputs.intervention_id }}
      intervention_option_id: ${{ steps.route.outputs.intervention_option_id }}
      intervention_answer_note: ${{ steps.route.outputs.intervention_answer_note }}
      resume_action: ${{ steps.route.outputs.resume_action }}
      repair_attempts: ${{ steps.route.outputs.repair_attempts }}
      intervention_repeated_failure_count: ${{ steps.route.outputs.intervention_repeated_failure_count }}
      intervention_failure_signature: ${{ steps.route.outputs.intervention_failure_signature }}
      stage_noop_attempts: ${{ steps.route.outputs.stage_noop_attempts }}
      stage_setup_attempts: ${{ steps.route.outputs.stage_setup_attempts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Route PR loop event
        id: route
        run: node scripts/route-pr-loop.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  reroute:
    needs: route
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.route.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      concurrency_key: ${{ steps.route.outputs.concurrency_key }}
      pr_number: ${{ steps.route.outputs.pr_number }}
      issue_number: ${{ steps.route.outputs.issue_number }}
      branch: ${{ steps.route.outputs.branch }}
      base_branch: ${{ steps.route.outputs.base_branch }}
      final_artifact_ref: ${{ steps.route.outputs.final_artifact_ref }}
      artifacts_path: ${{ steps.route.outputs.artifacts_path }}
      ci_run_id: ${{ steps.route.outputs.ci_run_id }}
      review_id: ${{ steps.route.outputs.review_id }}
      failure_intervention: ${{ steps.route.outputs.failure_intervention }}
      intervention_id: ${{ steps.route.outputs.intervention_id }}
      intervention_option_id: ${{ steps.route.outputs.intervention_option_id }}
      intervention_answer_note: ${{ steps.route.outputs.intervention_answer_note }}
      resume_action: ${{ steps.route.outputs.resume_action }}
      repair_attempts: ${{ steps.route.outputs.repair_attempts }}
      intervention_repeated_failure_count: ${{ steps.route.outputs.intervention_repeated_failure_count }}
      intervention_failure_signature: ${{ steps.route.outputs.intervention_failure_signature }}
      stage_noop_attempts: ${{ steps.route.outputs.stage_noop_attempts }}
      stage_setup_attempts: ${{ steps.route.outputs.stage_setup_attempts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Re-route PR loop event after acquiring the per-target lock
        id: route
        run: node scripts/route-pr-loop.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  finalize-merged-pr:
    if: needs.reroute.outputs.action == 'finalize_merge'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rewrite artifact links to base branch
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_ARTIFACT_REF: ${{ needs.reroute.outputs.final_artifact_ref }}

  answer-intervention:
    if: needs.reroute.outputs.action == 'answer_intervention'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      resume_action: ${{ steps.answer.outputs.resume_action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply intervention answer
        id: answer
        run: node scripts/apply-intervention-answer.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_INTERVENTION_ID: ${{ needs.reroute.outputs.intervention_id }}
          FACTORY_OPTION_ID: ${{ needs.reroute.outputs.intervention_option_id }}
          FACTORY_ANSWER_NOTE: ${{ needs.reroute.outputs.intervention_answer_note }}
          FACTORY_RESUME_ACTION: ${{ needs.reroute.outputs.resume_action }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  mark-in-progress:
    if: needs.reroute.outputs.action == 'implement' || needs.reroute.outputs.action == 'repair' || needs.reroute.outputs.action == 'review'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update PR status before stage run
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_STATUS: ${{ needs.reroute.outputs.action == 'implement' && 'implementing' || needs.reroute.outputs.action == 'repair' && 'repairing' || 'reviewing' }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.reroute.outputs.repair_attempts }}
          FACTORY_INTERVENTION_REPEATED_FAILURE_COUNT: ${{ needs.reroute.outputs.intervention_repeated_failure_count }}
          FACTORY_INTERVENTION_FAILURE_SIGNATURE: ${{ needs.reroute.outputs.intervention_failure_signature }}
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_PAUSED: "false"
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}

  resolve-stage-dispatch:
    if: |
      always() && (
        needs.reroute.outputs.action == 'implement' ||
        needs.reroute.outputs.action == 'repair' ||
        needs.reroute.outputs.action == 'review' ||
        needs.answer-intervention.outputs.resume_action == 'implement' ||
        needs.answer-intervention.outputs.resume_action == 'repair' ||
        needs.answer-intervention.outputs.resume_action == 'review'
      ) && (
        needs.answer-intervention.result == 'success' ||
        needs.answer-intervention.result == 'skipped'
      )
    needs:
      - reroute
      - answer-intervention
    runs-on: ubuntu-latest
    outputs:
      effective_action: ${{ steps.resolve.outputs.effective_action }}
    steps:
      - name: Resolve effective stage action
        id: resolve
        run: |
          effective_action="${RESUME_ACTION:-${ROUTE_ACTION:-}}"
          echo "effective_action=${effective_action}" >> "$GITHUB_OUTPUT"
        env:
          ROUTE_ACTION: ${{ needs.reroute.outputs.action }}
          RESUME_ACTION: ${{ needs.answer-intervention.outputs.resume_action }}

  pause-pr:
    if: needs.reroute.outputs.action == 'pause'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Pause factory PR
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_PAUSED: "true"
          FACTORY_PAUSE_REASON: "Paused via /factory pause"
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_COMMENT: Factory paused via `/factory pause`.

  reset-pr:
    if: needs.reroute.outputs.action == 'reset'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Reset factory PR state
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_STATUS: plan_ready
          FACTORY_REPAIR_ATTEMPTS: "0"
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ""
          FACTORY_LAST_READY_SHA: ""
          FACTORY_PENDING_REVIEW_SHA: ""
          FACTORY_BLOCKED_ACTION: ""
          FACTORY_INTERVENTION: "__CLEAR__"
          FACTORY_PENDING_STAGE_DECISION: "__CLEAR__"
          FACTORY_RESUME_AUTHORIZATIONS: "__CLEAR__"
          FACTORY_SELF_MODIFY_LABEL_ACTION: "remove_if_auto_applied"
          FACTORY_AUTO_APPLIED_SELF_MODIFY_LABEL: "false"
          FACTORY_PAUSED: "false"
          FACTORY_PAUSE_REASON: ""
          FACTORY_CI_STATUS: pending
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_CONVERT_TO_DRAFT: "true"
          FACTORY_COMMENT: Factory PR reset via `/factory reset`. Status set to plan_ready.

  stage:
    if: |
      always() &&
      (
        needs.resolve-stage-dispatch.outputs.effective_action == 'implement' ||
        needs.resolve-stage-dispatch.outputs.effective_action == 'repair' ||
        needs.resolve-stage-dispatch.outputs.effective_action == 'review'
      ) &&
      (
        needs.mark-in-progress.result == 'success' ||
        needs.mark-in-progress.result == 'skipped'
      ) &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - mark-in-progress
      - resolve-stage-dispatch
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: ${{ needs.resolve-stage-dispatch.outputs.effective_action }}
      issue_number: ${{ fromJSON(needs.reroute.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.reroute.outputs.pr_number) }}
      branch: ${{ needs.reroute.outputs.branch }}
      artifacts_path: ${{ needs.reroute.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.reroute.outputs.ci_run_id }}
      review_id: ${{ needs.reroute.outputs.review_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  stage-succeeded:
    if: |
      always() &&
      (
        needs.resolve-stage-dispatch.outputs.effective_action == 'implement' ||
        needs.resolve-stage-dispatch.outputs.effective_action == 'repair'
      ) &&
      needs.stage.outputs.intervention_requested != 'true' &&
      needs.stage.result == 'success' &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - stage
      - resolve-stage-dispatch
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record successful stage metadata
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BLOCKED_ACTION: ""
          FACTORY_INTERVENTION: "__CLEAR__"
          FACTORY_PENDING_STAGE_DECISION: "__CLEAR__"
          FACTORY_CLEAR_BUDGET_RESUME_AUTHORIZATION: ${{ needs.stage.outputs.budget_authorization_consumed || 'false' }}
          FACTORY_CLEAR_SELF_MODIFY_RESUME_AUTHORIZATION: ${{ needs.stage.outputs.self_modify_authorization_consumed || 'false' }}
          FACTORY_SELF_MODIFY_LABEL_ACTION: "remove_if_auto_applied"
          FACTORY_AUTO_APPLIED_SELF_MODIFY_LABEL: "false"
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_LAST_COMPLETED_STAGE: ${{ needs.resolve-stage-dispatch.outputs.effective_action == 'implement' && 'implement' || 'repair' }}
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}

  block-on-stage-intervention:
    if: |
      always() &&
      needs.resolve-stage-dispatch.outputs.effective_action == 'implement' &&
      needs.stage.result == 'success' &&
      needs.stage.outputs.intervention_requested == 'true' &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - stage
      - resolve-stage-dispatch
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Block PR on stage intervention request
        run: node scripts/handle-stage-intervention-request.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_STAGE_ACTION: implement
          FACTORY_INTERVENTION_REQUEST: ${{ needs.stage.outputs.intervention_payload }}
          FACTORY_CLEAR_BUDGET_RESUME_AUTHORIZATION: ${{ needs.stage.outputs.budget_authorization_consumed || 'false' }}
          FACTORY_CLEAR_SELF_MODIFY_RESUME_AUTHORIZATION: ${{ needs.stage.outputs.self_modify_authorization_consumed || 'false' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  stage-failed:
    if: |
      always() && (
        needs.resolve-stage-dispatch.outputs.effective_action == 'implement' ||
        needs.resolve-stage-dispatch.outputs.effective_action == 'repair' ||
        needs.resolve-stage-dispatch.outputs.effective_action == 'review'
      ) && needs.stage.result == 'failure' &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - stage
      - resolve-stage-dispatch
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.reroute.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.resolve-stage-dispatch.outputs.effective_action }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_REVIEW_ID: ${{ needs.reroute.outputs.review_id }}
          FACTORY_STAGE_NOOP_ATTEMPTS: ${{ needs.reroute.outputs.stage_noop_attempts }}
          FACTORY_STAGE_SETUP_ATTEMPTS: ${{ needs.reroute.outputs.stage_setup_attempts }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failed stage usage event
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: stage
          FACTORY_USAGE_OUTCOME: failed
          FACTORY_MODE: ${{ needs.resolve-stage-dispatch.outputs.effective_action }}
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_STAGE_MODEL: ${{ needs.stage.outputs.stage_model }}
          FACTORY_PROMPT_CHARS: ${{ needs.stage.outputs.prompt_chars }}
          FACTORY_ESTIMATED_INPUT_TOKENS: ${{ needs.stage.outputs.estimated_input_tokens }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS: ${{ needs.stage.outputs.estimated_cached_input_tokens }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS: ${{ needs.stage.outputs.estimated_output_tokens }}
          FACTORY_ESTIMATED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_cached_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_output_tokens_before_calibration }}
          FACTORY_USAGE_PROVIDER: ${{ needs.stage.outputs.usage_provider }}
          FACTORY_USAGE_API_SURFACE: ${{ needs.stage.outputs.usage_api_surface }}
          FACTORY_COST_PRICING_SOURCE: model
          FACTORY_USAGE_CALIBRATION_BUCKET: ${{ needs.stage.outputs.usage_calibration_key }}
          FACTORY_USAGE_CALIBRATION_SOURCE: ${{ needs.stage.outputs.usage_calibration_source }}
          FACTORY_USAGE_CALIBRATION_SAMPLE_SIZE: ${{ needs.stage.outputs.usage_calibration_sample_size }}
          FACTORY_USAGE_CALIBRATION_INPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_CACHED_INPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_cached_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_OUTPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_output_multiplier }}
          FACTORY_USAGE_CALIBRATION_GENERATED_AT: ${{ needs.stage.outputs.usage_calibration_generated_at }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: stage_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Handle classified stage failure
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.resolve-stage-dispatch.outputs.effective_action }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.reroute.outputs.repair_attempts }}
          FACTORY_INTERVENTION_REPEATED_FAILURE_COUNT: ${{ needs.reroute.outputs.intervention_repeated_failure_count }}
          FACTORY_INTERVENTION_FAILURE_SIGNATURE: ${{ needs.reroute.outputs.intervention_failure_signature }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_BUDGET_DECISION_DETAIL: ${{ needs.stage.outputs.budget_decision_detail || '' }}
          FACTORY_BUDGET_AUTHORIZATION_CONSUMED: ${{ needs.stage.outputs.budget_authorization_consumed || 'false' }}
          FACTORY_SELF_MODIFY_AUTHORIZATION_CONSUMED: ${{ needs.stage.outputs.self_modify_authorization_consumed || 'false' }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: ${{ needs.stage.outputs.transient_retry_attempts || '0' }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_REVIEW_ID: ${{ needs.reroute.outputs.review_id }}

  block:
    if: needs.reroute.outputs.action == 'blocked'
    needs: reroute
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mark PR as blocked
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_STATUS: blocked
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.reroute.outputs.repair_attempts }}
          FACTORY_BLOCKED_ACTION: repair
          FACTORY_INTERVENTION: ${{ needs.reroute.outputs.failure_intervention }}
          FACTORY_SELF_MODIFY_LABEL_ACTION: "remove_if_auto_applied"
          FACTORY_AUTO_APPLIED_SELF_MODIFY_LABEL: "false"
          FACTORY_COMMENT: Factory repair attempts hit the configured safety limit. Human intervention is required.

  process-review:
    if: |
      always() &&
      needs.resolve-stage-dispatch.outputs.effective_action == 'review' &&
      needs.stage.result == 'success' &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - stage
      - resolve-stage-dispatch
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      failure_message: ${{ steps.process_review.outputs.failure_message }}
      failure_type: ${{ steps.process_review.outputs.failure_type }}
      failure_phase: ${{ steps.process_review.outputs.failure_phase }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.reroute.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Process autonomous review artifacts
        id: process_review
        continue-on-error: true
        run: node scripts/process-review.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_REVIEW_METHOD: ${{ needs.stage.outputs.review_methodology || vars.FACTORY_REVIEW_METHOD || '' }}
          FACTORY_REVIEW_METHOD_REQUESTED: ${{ needs.stage.outputs.review_methodology_requested }}
          FACTORY_REVIEW_METHOD_FALLBACK: ${{ needs.stage.outputs.review_methodology_fallback }}

      - name: Stop on review processing failure
        if: steps.process_review.outcome == 'failure'
        run: exit 1

  review-processing-failed:
    if: |
      always() &&
      needs.resolve-stage-dispatch.outputs.effective_action == 'review' &&
      needs['process-review'].result == 'failure' &&
      needs.resolve-stage-dispatch.result == 'success'
    needs:
      - reroute
      - process-review
      - resolve-stage-dispatch
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      schedule_repair: ${{ steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false' }}
      repair_attempts: ${{ steps.prepare_repair.outputs.repair_attempts }}
      intervention_repeated_failure_count: ${{ steps.prepare_repair.outputs.intervention_repeated_failure_count }}
      intervention_failure_signature: ${{ steps.prepare_repair.outputs.intervention_failure_signature }}
      failure_metadata: ${{ steps.prepare_repair.outputs.failure_metadata }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.reroute.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: review_processing_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Prepare review artifact repair state
        id: prepare_repair
        if: needs['process-review'].outputs.failure_type == 'review_artifact_contract'
        run: node scripts/prepare-review-artifact-repair.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}

      - name: Update PR metadata for review artifact repair
        if: steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false'
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_STATUS: repairing
          FACTORY_REPAIR_ATTEMPTS: ${{ steps.prepare_repair.outputs.repair_attempts }}
          FACTORY_BLOCKED_ACTION: ""
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_CI_STATUS: pending
          FACTORY_INTERVENTION: ${{ steps.prepare_repair.outputs.failure_intervention }}
          FACTORY_SELF_MODIFY_LABEL_ACTION: "remove_if_auto_applied"
          FACTORY_AUTO_APPLIED_SELF_MODIFY_LABEL: "false"

      - name: Mark PR as blocked after review processing failure
        if: steps.prepare_repair.outcome != 'success' || steps.prepare_repair.outputs.blocked == 'true'
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}

  review-artifact-repair:
    if: needs.review-processing-failed.outputs.schedule_repair == 'true'
    needs:
      - reroute
      - review-processing-failed
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: repair
      issue_number: ${{ fromJSON(needs.reroute.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.reroute.outputs.pr_number) }}
      branch: ${{ needs.reroute.outputs.branch }}
      artifacts_path: ${{ needs.reroute.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.reroute.outputs.ci_run_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  review-artifact-repair-succeeded:
    if: needs.review-processing-failed.outputs.schedule_repair == 'true' && needs.review-artifact-repair.result == 'success'
    needs:
      - reroute
      - review-processing-failed
      - review-artifact-repair
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record successful repair metadata
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BLOCKED_ACTION: ""
          FACTORY_INTERVENTION: "__CLEAR__"
          FACTORY_SELF_MODIFY_LABEL_ACTION: "remove_if_auto_applied"
          FACTORY_AUTO_APPLIED_SELF_MODIFY_LABEL: "false"
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.review-artifact-repair.outputs.refreshed_head_sha }}
          FACTORY_LAST_COMPLETED_STAGE: "repair"
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}

  review-artifact-repair-failed:
    if: always() && needs.review-processing-failed.outputs.schedule_repair == 'true' && needs.review-artifact-repair.result == 'failure'
    needs:
      - reroute
      - review-processing-failed
      - review-artifact-repair
    runs-on: ubuntu-latest
    concurrency:
      group: factory-pr-loop-${{ needs.reroute.outputs.concurrency_key }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.reroute.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: repair
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.review-artifact-repair.outputs.failure_message }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
          FACTORY_STAGE_NOOP_ATTEMPTS: ${{ needs.reroute.outputs.stage_noop_attempts }}
          FACTORY_STAGE_SETUP_ATTEMPTS: ${{ needs.reroute.outputs.stage_setup_attempts }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failed repair stage usage event
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: stage
          FACTORY_USAGE_OUTCOME: failed
          FACTORY_MODE: repair
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_STAGE_MODEL: ${{ needs.review-artifact-repair.outputs.stage_model }}
          FACTORY_PROMPT_CHARS: ${{ needs.review-artifact-repair.outputs.prompt_chars }}
          FACTORY_ESTIMATED_INPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_input_tokens }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_cached_input_tokens }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_output_tokens }}
          FACTORY_ESTIMATED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_cached_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_output_tokens_before_calibration }}
          FACTORY_USAGE_PROVIDER: ${{ needs.review-artifact-repair.outputs.usage_provider }}
          FACTORY_USAGE_API_SURFACE: ${{ needs.review-artifact-repair.outputs.usage_api_surface }}
          FACTORY_COST_PRICING_SOURCE: model
          FACTORY_USAGE_CALIBRATION_BUCKET: ${{ needs.review-artifact-repair.outputs.usage_calibration_key }}
          FACTORY_USAGE_CALIBRATION_SOURCE: ${{ needs.review-artifact-repair.outputs.usage_calibration_source }}
          FACTORY_USAGE_CALIBRATION_SAMPLE_SIZE: ${{ needs.review-artifact-repair.outputs.usage_calibration_sample_size }}
          FACTORY_USAGE_CALIBRATION_INPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_CACHED_INPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_cached_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_OUTPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_output_multiplier }}
          FACTORY_USAGE_CALIBRATION_GENERATED_AT: ${{ needs.review-artifact-repair.outputs.usage_calibration_generated_at }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: review_artifact_repair_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.reroute.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Handle classified repair failure
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.reroute.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: repair
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.review-processing-failed.outputs.repair_attempts }}
          FACTORY_INTERVENTION_REPEATED_FAILURE_COUNT: ${{ needs.review-processing-failed.outputs.intervention_repeated_failure_count }}
          FACTORY_INTERVENTION_FAILURE_SIGNATURE: ${{ needs.review-processing-failed.outputs.intervention_failure_signature }}
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.review-artifact-repair.outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: ${{ needs.review-artifact-repair.outputs.transient_retry_attempts || '0' }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.review-artifact-repair.outputs.refreshed_head_sha }}
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          FACTORY_BRANCH: ${{ needs.reroute.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.reroute.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.reroute.outputs.ci_run_id }}
