name: Factory PR Loop
run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('Factory: implementing {0}', github.event.pull_request.title) ||
    github.event_name == 'pull_request_review' &&
    format('Factory: repairing {0}', github.event.pull_request.title) ||
    github.event_name == 'workflow_run' &&
    github.event.workflow_run.event == 'pull_request' &&
    (
      github.event.workflow_run.conclusion == 'success' &&
      format(
        'Factory: reviewing {0}',
        github.event.workflow_run.display_title || github.event.workflow_run.head_branch
      ) ||
      contains(
        fromJSON('["failure","timed_out","action_required"]'),
        github.event.workflow_run.conclusion
      ) &&
      format(
        'Factory: repairing {0}',
        github.event.workflow_run.display_title || github.event.workflow_run.head_branch
      )
    ) ||
    'Factory PR Loop'
  }}

on:
  pull_request:
    types:
      - labeled
  pull_request_review:
    types:
      - submitted
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  # Keep this expression limited to properties that are always available for the
  # triggering event. Invalid dereferences here fail the entire workflow at startup.
  group: factory-pr-loop-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      pr_number: ${{ steps.route.outputs.pr_number }}
      issue_number: ${{ steps.route.outputs.issue_number }}
      branch: ${{ steps.route.outputs.branch }}
      artifacts_path: ${{ steps.route.outputs.artifacts_path }}
      ci_run_id: ${{ steps.route.outputs.ci_run_id }}
      review_id: ${{ steps.route.outputs.review_id }}
      repair_attempts: ${{ steps.route.outputs.repair_attempts }}
      repeated_failure_count: ${{ steps.route.outputs.repeated_failure_count }}
      last_failure_signature: ${{ steps.route.outputs.last_failure_signature }}
      stage_noop_attempts: ${{ steps.route.outputs.stage_noop_attempts }}
      stage_setup_attempts: ${{ steps.route.outputs.stage_setup_attempts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Route PR loop event
        id: route
        run: node scripts/route-pr-loop.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  mark-in-progress:
    if: needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review'
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update PR status before stage run
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: ${{ needs.route.outputs.action == 'implement' && 'implementing' || needs.route.outputs.action == 'repair' && 'repairing' || 'reviewing' }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_REMOVE_LABELS: ${{ needs.route.outputs.action == 'implement' && 'factory:plan-ready' || '' }}
          FACTORY_CLEAR_IMPLEMENT_LABEL: ${{ needs.route.outputs.action == 'implement' && 'true' || 'false' }}
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  stage:
    if: needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review'
    needs:
      - route
      - mark-in-progress
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: ${{ needs.route.outputs.action }}
      issue_number: ${{ fromJSON(needs.route.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.route.outputs.pr_number) }}
      branch: ${{ needs.route.outputs.branch }}
      artifacts_path: ${{ needs.route.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.route.outputs.ci_run_id }}
      review_id: ${{ needs.route.outputs.review_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  stage-succeeded:
    if: (needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair') && needs.stage.result == 'success'
    needs:
      - route
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record successful stage metadata
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_LAST_FAILURE_TYPE: ""
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: "__CLEAR__"
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_STAGE_NOOP_ATTEMPTS: "0"
          FACTORY_STAGE_SETUP_ATTEMPTS: "0"
          FACTORY_LAST_COMPLETED_STAGE: ${{ needs.route.outputs.action == 'implement' && 'implement' || 'repair' }}
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  stage-failed:
    if: always() && (needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review') && needs.stage.result == 'failure'
    needs:
      - route
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.route.outputs.action }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_STAGE_NOOP_ATTEMPTS: ${{ needs.route.outputs.stage_noop_attempts }}
          FACTORY_STAGE_SETUP_ATTEMPTS: ${{ needs.route.outputs.stage_setup_attempts }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failed stage usage event
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: stage
          FACTORY_USAGE_OUTCOME: failed
          FACTORY_MODE: ${{ needs.route.outputs.action }}
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_STAGE_MODEL: ${{ needs.stage.outputs.stage_model }}
          FACTORY_PROMPT_CHARS: ${{ needs.stage.outputs.prompt_chars }}
          FACTORY_ESTIMATED_INPUT_TOKENS: ${{ needs.stage.outputs.estimated_input_tokens }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS: ${{ needs.stage.outputs.estimated_cached_input_tokens }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS: ${{ needs.stage.outputs.estimated_output_tokens }}
          FACTORY_ESTIMATED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_cached_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.stage.outputs.estimated_output_tokens_before_calibration }}
          FACTORY_USAGE_PROVIDER: ${{ needs.stage.outputs.usage_provider }}
          FACTORY_USAGE_API_SURFACE: ${{ needs.stage.outputs.usage_api_surface }}
          FACTORY_COST_PRICING_SOURCE: model
          FACTORY_USAGE_CALIBRATION_BUCKET: ${{ needs.stage.outputs.usage_calibration_key }}
          FACTORY_USAGE_CALIBRATION_SOURCE: ${{ needs.stage.outputs.usage_calibration_source }}
          FACTORY_USAGE_CALIBRATION_SAMPLE_SIZE: ${{ needs.stage.outputs.usage_calibration_sample_size }}
          FACTORY_USAGE_CALIBRATION_INPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_CACHED_INPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_cached_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_OUTPUT_MULTIPLIER: ${{ needs.stage.outputs.usage_calibration_output_multiplier }}
          FACTORY_USAGE_CALIBRATION_GENERATED_AT: ${{ needs.stage.outputs.usage_calibration_generated_at }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: stage_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Handle classified stage failure
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.route.outputs.action }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: ${{ needs.stage.outputs.transient_retry_attempts || '0' }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}

  block:
    if: needs.route.outputs.action == 'blocked'
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mark PR as blocked
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: blocked
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_LAST_FAILURE_TYPE: content_or_logic
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_ADD_LABELS: factory:blocked
          FACTORY_COMMENT: Factory repair attempts hit the configured safety limit. Human intervention is required.

  process-review:
    if: needs.route.outputs.action == 'review'
    needs:
      - route
      - mark-in-progress
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      failure_message: ${{ steps.process_review.outputs.failure_message }}
      failure_type: ${{ steps.process_review.outputs.failure_type }}
      failure_phase: ${{ steps.process_review.outputs.failure_phase }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Process autonomous review artifacts
        id: process_review
        continue-on-error: true
        run: node scripts/process-review.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_REVIEW_METHOD: ${{ needs.stage.outputs.review_methodology || vars.FACTORY_REVIEW_METHOD || '' }}
          FACTORY_REVIEW_METHOD_REQUESTED: ${{ needs.stage.outputs.review_methodology_requested }}
          FACTORY_REVIEW_METHOD_FALLBACK: ${{ needs.stage.outputs.review_methodology_fallback }}

      - name: Stop on review processing failure
        if: steps.process_review.outcome == 'failure'
        run: exit 1

  review-processing-failed:
    if: needs.route.outputs.action == 'review' && needs['process-review'].result == 'failure'
    needs:
      - route
      - process-review
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      schedule_repair: ${{ steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false' }}
      repair_attempts: ${{ steps.prepare_repair.outputs.repair_attempts }}
      repeated_failure_count: ${{ steps.prepare_repair.outputs.repeated_failure_count }}
      last_failure_signature: ${{ steps.prepare_repair.outputs.last_failure_signature }}
      failure_metadata: ${{ steps.prepare_repair.outputs.failure_metadata }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: review_processing_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Prepare review artifact repair state
        id: prepare_repair
        if: needs['process-review'].outputs.failure_type == 'review_artifact_contract'
        run: node scripts/prepare-review-artifact-repair.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}

      - name: Update PR metadata for review artifact repair
        if: steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false'
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: repairing
          FACTORY_REPAIR_ATTEMPTS: ${{ steps.prepare_repair.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ steps.prepare_repair.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ steps.prepare_repair.outputs.last_failure_signature }}
          FACTORY_LAST_FAILURE_TYPE: review_artifact_contract
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: ${{ steps.prepare_repair.outputs.failure_metadata }}
          FACTORY_REMOVE_LABELS: factory:blocked
          FACTORY_CI_STATUS: pending
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"

      - name: Mark PR as blocked after review processing failure
        if: steps.prepare_repair.outcome != 'success' || steps.prepare_repair.outputs.blocked == 'true'
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: ${{ steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.failure_metadata || '__UNCHANGED__' }}

  review-artifact-repair:
    if: needs.review-processing-failed.outputs.schedule_repair == 'true'
    needs:
      - route
      - review-processing-failed
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: repair
      issue_number: ${{ fromJSON(needs.route.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.route.outputs.pr_number) }}
      branch: ${{ needs.route.outputs.branch }}
      artifacts_path: ${{ needs.route.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.route.outputs.ci_run_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  review-artifact-repair-succeeded:
    if: needs.review-processing-failed.outputs.schedule_repair == 'true' && needs.review-artifact-repair.result == 'success'
    needs:
      - route
      - review-processing-failed
      - review-artifact-repair
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record successful repair metadata
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_LAST_FAILURE_TYPE: ""
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: "__CLEAR__"
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.review-artifact-repair.outputs.refreshed_head_sha }}
          FACTORY_STAGE_NOOP_ATTEMPTS: "0"
          FACTORY_STAGE_SETUP_ATTEMPTS: "0"
          FACTORY_LAST_COMPLETED_STAGE: "repair"
          FACTORY_LAST_RUN_ID: ${{ github.run_id }}
          FACTORY_LAST_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  review-artifact-repair-failed:
    if: always() && needs.review-processing-failed.outputs.schedule_repair == 'true' && needs.review-artifact-repair.result == 'failure'
    needs:
      - route
      - review-processing-failed
      - review-artifact-repair
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: repair
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.review-artifact-repair.outputs.failure_message }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_STAGE_NOOP_ATTEMPTS: ${{ needs.route.outputs.stage_noop_attempts }}
          FACTORY_STAGE_SETUP_ATTEMPTS: ${{ needs.route.outputs.stage_setup_attempts }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Budget preflight hook
        run: echo "Budget enforcement hook not configured."

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Record failed repair stage usage event
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: stage
          FACTORY_USAGE_OUTCOME: failed
          FACTORY_MODE: repair
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_STAGE_MODEL: ${{ needs.review-artifact-repair.outputs.stage_model }}
          FACTORY_PROMPT_CHARS: ${{ needs.review-artifact-repair.outputs.prompt_chars }}
          FACTORY_ESTIMATED_INPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_input_tokens }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_cached_input_tokens }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS: ${{ needs.review-artifact-repair.outputs.estimated_output_tokens }}
          FACTORY_ESTIMATED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_CACHED_INPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_cached_input_tokens_before_calibration }}
          FACTORY_ESTIMATED_OUTPUT_TOKENS_BEFORE_CALIBRATION: ${{ needs.review-artifact-repair.outputs.estimated_output_tokens_before_calibration }}
          FACTORY_USAGE_PROVIDER: ${{ needs.review-artifact-repair.outputs.usage_provider }}
          FACTORY_USAGE_API_SURFACE: ${{ needs.review-artifact-repair.outputs.usage_api_surface }}
          FACTORY_COST_PRICING_SOURCE: model
          FACTORY_USAGE_CALIBRATION_BUCKET: ${{ needs.review-artifact-repair.outputs.usage_calibration_key }}
          FACTORY_USAGE_CALIBRATION_SOURCE: ${{ needs.review-artifact-repair.outputs.usage_calibration_source }}
          FACTORY_USAGE_CALIBRATION_SAMPLE_SIZE: ${{ needs.review-artifact-repair.outputs.usage_calibration_sample_size }}
          FACTORY_USAGE_CALIBRATION_INPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_CACHED_INPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_cached_input_multiplier }}
          FACTORY_USAGE_CALIBRATION_OUTPUT_MULTIPLIER: ${{ needs.review-artifact-repair.outputs.usage_calibration_output_multiplier }}
          FACTORY_USAGE_CALIBRATION_GENERATED_AT: ${{ needs.review-artifact-repair.outputs.usage_calibration_generated_at }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Record failure diagnosis usage event
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        run: node scripts/record-usage-event.mjs
        env:
          FACTORY_USAGE_CATEGORY: failure_diagnosis
          FACTORY_USAGE_OUTCOME: ${{ steps.diagnosis.outcome == 'success' && 'succeeded' || 'failed' }}
          FACTORY_FAILURE_KIND: review_artifact_repair_failure
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_FAILURE_DIAGNOSIS_MODEL: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          FACTORY_PROMPT_FILE: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}

      - name: Commit usage events
        continue-on-error: true
        run: |
          if [ -d .factory/usage-events ]; then
            git add .factory/usage-events
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "factory(telemetry): record usage events"

      - name: Push usage events
        continue-on-error: true
        run: node scripts/push-stage-output.mjs
        env:
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_TRANSIENT_RETRY_LIMIT: 2

      - name: Handle classified repair failure
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: repair
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.review-processing-failed.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.review-processing-failed.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.review-processing-failed.outputs.last_failure_signature }}
          FACTORY_FAILURE_TYPE: ${{ needs.review-artifact-repair.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.review-artifact-repair.outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: ${{ needs.review-artifact-repair.outputs.transient_retry_attempts || '0' }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.review-artifact-repair.outputs.refreshed_head_sha }}
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
