name: Factory PR Loop

on:
  pull_request:
    types:
      - labeled
  pull_request_review:
    types:
      - submitted
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  # Keep this expression limited to properties that are always available for the
  # triggering event. Invalid dereferences here fail the entire workflow at startup.
  group: factory-pr-loop-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      action: ${{ steps.route.outputs.action }}
      pr_number: ${{ steps.route.outputs.pr_number }}
      issue_number: ${{ steps.route.outputs.issue_number }}
      branch: ${{ steps.route.outputs.branch }}
      artifacts_path: ${{ steps.route.outputs.artifacts_path }}
      ci_run_id: ${{ steps.route.outputs.ci_run_id }}
      review_id: ${{ steps.route.outputs.review_id }}
      repair_attempts: ${{ steps.route.outputs.repair_attempts }}
      repeated_failure_count: ${{ steps.route.outputs.repeated_failure_count }}
      last_failure_signature: ${{ steps.route.outputs.last_failure_signature }}
      stage_noop_attempts: ${{ steps.route.outputs.stage_noop_attempts }}
      stage_setup_attempts: ${{ steps.route.outputs.stage_setup_attempts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Route PR loop event
        id: route
        run: node scripts/route-pr-loop.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  mark-in-progress:
    if: needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review'
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update PR status before stage run
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: ${{ needs.route.outputs.action == 'implement' && 'implementing' || needs.route.outputs.action == 'repair' && 'repairing' || 'reviewing' }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_REMOVE_LABELS: ${{ needs.route.outputs.action == 'implement' && 'factory:plan-ready' || '' }}
          FACTORY_CLEAR_IMPLEMENT_LABEL: ${{ needs.route.outputs.action == 'implement' && 'true' || 'false' }}

  stage:
    if: needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review'
    needs:
      - route
      - mark-in-progress
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: ${{ needs.route.outputs.action }}
      issue_number: ${{ fromJSON(needs.route.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.route.outputs.pr_number) }}
      branch: ${{ needs.route.outputs.branch }}
      artifacts_path: ${{ needs.route.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.route.outputs.ci_run_id }}
      review_id: ${{ needs.route.outputs.review_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}

  stage-succeeded:
    if: (needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair') && needs.stage.result == 'success'
    needs:
      - route
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Record successful stage metadata
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_LAST_FAILURE_TYPE: ""
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: "__CLEAR__"
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_STAGE_NOOP_ATTEMPTS: "0"
          FACTORY_STAGE_SETUP_ATTEMPTS: "0"

  stage-failed:
    if: always() && (needs.route.outputs.action == 'implement' || needs.route.outputs.action == 'repair' || needs.route.outputs.action == 'review') && needs.stage.result == 'failure'
    needs:
      - route
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.route.outputs.action }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_STAGE_NOOP_ATTEMPTS: ${{ needs.route.outputs.stage_noop_attempts }}
          FACTORY_STAGE_SETUP_ATTEMPTS: ${{ needs.route.outputs.stage_setup_attempts }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Handle classified stage failure
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: stage
          FACTORY_FAILED_ACTION: ${{ needs.route.outputs.action }}
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_FAILURE_TYPE: ${{ needs.stage.outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs.stage.outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: ${{ needs.stage.outputs.transient_retry_attempts || '0' }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}

  block:
    if: needs.route.outputs.action == 'blocked'
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Mark PR as blocked
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: blocked
          FACTORY_REPAIR_ATTEMPTS: ${{ needs.route.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ needs.route.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ needs.route.outputs.last_failure_signature }}
          FACTORY_LAST_FAILURE_TYPE: content_or_logic
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_ADD_LABELS: factory:blocked
          FACTORY_COMMENT: Factory repair attempts hit the configured safety limit. Human intervention is required.

  process-review:
    if: needs.route.outputs.action == 'review'
    needs:
      - route
      - mark-in-progress
      - stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      failure_message: ${{ steps.process_review.outputs.failure_message }}
      failure_type: ${{ steps.process_review.outputs.failure_type }}
      failure_phase: ${{ steps.process_review.outputs.failure_phase }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Process autonomous review artifacts
        id: process_review
        continue-on-error: true
        run: node scripts/process-review.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_ISSUE_NUMBER: ${{ needs.route.outputs.issue_number }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REFRESHED_SHA: ${{ needs.stage.outputs.refreshed_head_sha }}
          FACTORY_REVIEW_METHOD: ${{ needs.stage.outputs.review_methodology || vars.FACTORY_REVIEW_METHOD || '' }}
          FACTORY_REVIEW_METHOD_REQUESTED: ${{ needs.stage.outputs.review_methodology_requested }}
          FACTORY_REVIEW_METHOD_FALLBACK: ${{ needs.stage.outputs.review_methodology_fallback }}

      - name: Stop on review processing failure
        if: steps.process_review.outcome == 'failure'
        run: exit 1

  review-processing-failed:
    if: needs.route.outputs.action == 'review' && needs['process-review'].result == 'failure'
    needs:
      - route
      - process-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      schedule_repair: ${{ steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false' }}
      repair_attempts: ${{ steps.prepare_repair.outputs.repair_attempts }}
      repeated_failure_count: ${{ steps.prepare_repair.outputs.repeated_failure_count }}
      last_failure_signature: ${{ steps.prepare_repair.outputs.last_failure_signature }}
      failure_metadata: ${{ steps.prepare_repair.outputs.failure_metadata }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.route.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build failure diagnosis prompt
        id: diagnosis_prompt
        run: node scripts/build-failure-diagnosis-prompt.mjs
        env:
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}

      - name: Decide whether to run failure diagnosis
        id: diagnosis_gate
        env:
          FACTORY_ENABLE_FAILURE_DIAGNOSIS: ${{ vars.FACTORY_ENABLE_FAILURE_DIAGNOSIS || 'true' }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
        run: |
          run_diagnosis=true
          case "${FACTORY_ENABLE_FAILURE_DIAGNOSIS,,}" in
            false|0|no|off)
              run_diagnosis=false
              ;;
          esac
          case "${FACTORY_FAILURE_TYPE}" in
            configuration|transient_infra|stale_branch_conflict|stale_stage_push|stage_noop|stage_setup)
              run_diagnosis=false
              ;;
          esac
          echo "run_diagnosis=${run_diagnosis}" >> "$GITHUB_OUTPUT"

      - name: Run Codex failure diagnosis
        id: diagnosis
        if: steps.diagnosis_gate.outputs.run_diagnosis == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.diagnosis_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ vars.FACTORY_FAILURE_DIAGNOSIS_MODEL || 'gpt-5-mini' }}
          codex-version: 0.114.0
          codex-args: --full-auto

      - name: Prepare review artifact repair state
        id: prepare_repair
        if: needs['process-review'].outputs.failure_type == 'review_artifact_contract'
        run: node scripts/prepare-review-artifact-repair.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}

      - name: Update PR metadata for review artifact repair
        if: steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.blocked == 'false'
        run: node scripts/apply-pr-state.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_STATUS: repairing
          FACTORY_REPAIR_ATTEMPTS: ${{ steps.prepare_repair.outputs.repair_attempts }}
          FACTORY_REPEATED_FAILURE_COUNT: ${{ steps.prepare_repair.outputs.repeated_failure_count }}
          FACTORY_LAST_FAILURE_SIGNATURE: ${{ steps.prepare_repair.outputs.last_failure_signature }}
          FACTORY_LAST_FAILURE_TYPE: review_artifact_contract
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: ${{ steps.prepare_repair.outputs.failure_metadata }}
          FACTORY_REMOVE_LABELS: factory:blocked
          FACTORY_CI_STATUS: pending
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"

      - name: Mark PR as blocked after review processing failure
        if: steps.prepare_repair.outcome != 'success' || steps.prepare_repair.outputs.blocked == 'true'
        run: node scripts/handle-stage-failure.mjs
        env:
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_PR_NUMBER: ${{ needs.route.outputs.pr_number }}
          FACTORY_FAILURE_PHASE: ${{ needs['process-review'].outputs.failure_phase || 'review_delivery' }}
          FACTORY_FAILED_ACTION: review
          FACTORY_LAST_PROCESSED_WORKFLOW_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_FAILURE_TYPE: ${{ needs['process-review'].outputs.failure_type || 'content_or_logic' }}
          FACTORY_FAILURE_MESSAGE: ${{ needs['process-review'].outputs.failure_message }}
          FACTORY_TRANSIENT_RETRY_ATTEMPTS: "0"
          FACTORY_FAILURE_ADVISORY_PATH: ${{ steps.diagnosis_prompt.outputs.advisory_path }}
          FACTORY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_BRANCH: ${{ needs.route.outputs.branch }}
          FACTORY_ARTIFACTS_PATH: ${{ needs.route.outputs.artifacts_path }}
          FACTORY_CI_RUN_ID: ${{ needs.route.outputs.ci_run_id }}
          FACTORY_LAST_REVIEW_ARTIFACT_FAILURE: ${{ steps.prepare_repair.outcome == 'success' && steps.prepare_repair.outputs.failure_metadata || '__UNCHANGED__' }}

  review-artifact-repair:
    if: needs.review-processing-failed.outputs.schedule_repair == 'true'
    needs:
      - route
      - review-processing-failed
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_factory-stage.yml
    with:
      mode: repair
      issue_number: ${{ fromJSON(needs.route.outputs.issue_number) }}
      pr_number: ${{ fromJSON(needs.route.outputs.pr_number) }}
      branch: ${{ needs.route.outputs.branch }}
      artifacts_path: ${{ needs.route.outputs.artifacts_path }}
      max_repair_attempts: 3
      ci_run_id: ${{ needs.route.outputs.ci_run_id }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
