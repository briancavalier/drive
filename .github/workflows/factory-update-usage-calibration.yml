name: Factory Update Usage Calibration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: factory-update-usage-calibration
  cancel-in-progress: false

jobs:
  update-calibration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Regenerate usage calibration
        id: calibrate
        run: node scripts/calibrate-usage-estimates.mjs

      - name: Detect calibration diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .factory/usage-calibration.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize calibration run
        run: |
          {
            echo "## Usage Calibration"
            echo ""
            echo "- Buckets updated: ${{ steps.calibrate.outputs.buckets_updated }}"
            echo "- Entries evaluated: ${{ steps.calibrate.outputs.entries_evaluated }}"
            echo "- Entries skipped: ${{ steps.calibrate.outputs.entries_skipped }}"
            echo "- Calibration file changed: ${{ steps.diff.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when calibration is unchanged
        if: steps.diff.outputs.changed != 'true'
        run: echo "Usage calibration unchanged; no PR created."

      - name: Prepare calibration branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/usage-calibration-$(date -u +%Y%m%d-%H%M%S)"
          git switch -c "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Commit calibration update
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .factory/usage-calibration.json
          git commit -m "factory: update usage calibration"

      - name: Push calibration branch
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Open calibration pull request
        if: steps.diff.outputs.changed == 'true'
        id: pr
        run: node scripts/manage-usage-calibration-pr.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FACTORY_CALIBRATION_BRANCH: ${{ steps.branch.outputs.branch }}
          FACTORY_CALIBRATION_BASE_BRANCH: main
          FACTORY_CALIBRATION_PR_TITLE: "Factory: Update usage calibration"
          FACTORY_CALIBRATION_BRANCH_PREFIX: automation/usage-calibration-
          FACTORY_CALIBRATION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FACTORY_CALIBRATION_BUCKETS_UPDATED: ${{ steps.calibrate.outputs.buckets_updated }}
          FACTORY_CALIBRATION_ENTRIES_EVALUATED: ${{ steps.calibrate.outputs.entries_evaluated }}
          FACTORY_CALIBRATION_ENTRIES_SKIPPED: ${{ steps.calibrate.outputs.entries_skipped }}

      - name: Summarize calibration PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo ""
            echo "- Calibration PR: ${{ steps.pr.outputs.pr_url }}"
            echo "- Replaced prior PRs: ${{ steps.pr.outputs.replaced_pr_count }}"
            echo "- Deleted prior branches: ${{ steps.pr.outputs.deleted_branch_count }}"
          } >> "$GITHUB_STEP_SUMMARY"
